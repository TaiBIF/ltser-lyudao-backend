version: "3.7"

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile.prod
        expose:
            - 8001
        restart: always

    nginx:
        image: nginx:alpine
        restart: always
        ports:
            - 80:80
            - 443:443
        volumes:
            - ./nginx:/etc/nginx/conf.d
            - ../ltser-lyudao-volumes/frontend:/frontend
            - ../ltser-lyudao-volumes/certbot/conf:/etc/letsencrypt
            - ../ltser-lyudao-volumes/certbot/www:/var/www/certbot
            - ../ltser-lyudao-volumes/static:/app/static
            - ../ltser-lyudao-volumes/media:/app/media
    certbot:
        image: certbot/certbot
        volumes:
            - ../ltser-lyudao-volumes/certbot/conf:/etc/letsencrypt
            - ../ltser-lyudao-volumes/certbot/www:/var/www/certbot
        entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    db:
        restart: always
        ports:
            - "5432:5432"
    n8n:
        environment:
            - N8N_HOST=ltsertwlyudao.org
            - N8N_PROTOCOL=https
            - N8N_PORT=5678
            - N8N_PATH=/n8n/
            - WEBHOOK_URL=https://ltsertwlyudao.org/n8n/
            - N8N_EDITOR_BASE_URL=https://ltsertwlyudao.org/n8n/
